name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  build:
    name: build (${{ matrix.target }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
          - target: aarch64-unknown-linux-musl
            os: ubuntu-24.04-arm
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - name: Install musl toolchain
        if: contains(matrix.target, 'musl')
        run: sudo apt-get update -q && sudo apt-get install -y -q musl-tools
      - name: Install cosign
        uses: sigstore/cosign-installer@v3
      - name: Test
        run: cargo test --workspace
      - name: Build
        run: cargo build --release --target ${{ matrix.target }} -p asp
        env:
          CARGO_TARGET_X86_64_UNKNOWN_LINUX_MUSL_LINKER: musl-gcc
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_LINKER: musl-gcc
      - name: Package
        run: |
          VERSION="${GITHUB_REF_NAME}"
          ASSET="asp-${VERSION}-${{ matrix.target }}.tar.gz"
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/asp" dist/
          tar -czf "$ASSET" -C dist asp
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "$ASSET" > "$ASSET.sha256"
          else
            shasum -a 256 "$ASSET" > "$ASSET.sha256"
          fi
      - name: Sign checksum
        run: |
          for checksum in asp-*.sha256; do
            cosign sign-blob --yes --bundle "$checksum.sigstore.json" "$checksum"
          done
      - name: Attest release archive provenance
        uses: actions/attest@v4
        with:
          subject-path: asp-*.tar.gz
      - uses: actions/upload-artifact@v4
        with:
          name: asp-${{ matrix.target }}
          path: |
            asp-*.tar.gz
            asp-*.sha256
            asp-*.sigstore.json

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-cyclonedx
        run: cargo install cargo-cyclonedx --version 0.5.9 --locked
      - name: Generate SBOMs
        run: |
          VERSION="${GITHUB_REF_NAME}"
          cargo cyclonedx \
            --manifest-path Cargo.toml \
            --format json \
            --target all \
            --all-features \
            --override-filename "asp-${VERSION}-sbom"
          mv "crates/asp/asp-${VERSION}-sbom.json" "asp-${VERSION}-asp-sbom.cdx.json"
          mv "crates/asp-core/asp-${VERSION}-sbom.json" "asp-${VERSION}-asp-core-sbom.cdx.json"
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            asp-*.tar.gz
            asp-*.sha256
            asp-*.sigstore.json
            asp-*-sbom.cdx.json
          generate_release_notes: true
