name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  cargo-deny:
    name: dependency policy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          rust-version: "1.85.0"
          manifest-path: ./Cargo.toml
          command: check
          arguments: --all-features

  test:
    name: test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Format
        run: cargo fmt --all -- --check
      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Test (includes kill -9 torture suite)
        run: cargo test --workspace

  windows-unsupported:
    name: windows unsupported gate
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build workspace
        run: cargo build --workspace
      - name: Unit guard reports intentional unsupported platform
        run: cargo test -p asp-core windows_fails_with_actionable_hint
      - name: CLI guard reports unsupported_platform
        shell: pwsh
        run: |
          $env:NO_COLOR = "1"
          & .\target\debug\asp.exe --json init > asp-windows.json
          if ($LASTEXITCODE -eq 0) {
            Get-Content asp-windows.json
            throw "asp init unexpectedly succeeded on Windows"
          }
          Get-Content asp-windows.json
          Select-String -Path asp-windows.json -Pattern '"code": "unsupported_platform"'
          Select-String -Path asp-windows.json -Pattern 'WSL2'
          exit 0

  linux-reflink:
    name: linux reflink path (btrfs)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Mount a btrfs volume for TMPDIR
        run: |
          sudo apt-get update -q && sudo apt-get install -y -q btrfs-progs
          truncate -s 3G /tmp/btrfs.img
          mkfs.btrfs -q /tmp/btrfs.img
          sudo mkdir -p /mnt/btrfs
          sudo mount -o loop /tmp/btrfs.img /mnt/btrfs
          sudo chmod 1777 /mnt/btrfs
      - name: Test on btrfs (exercises FICLONE reflink forks)
        run: TMPDIR=/mnt/btrfs cargo test --workspace
      - name: Assert forks really reflink on btrfs (no silent copy fallback)
        run: |
          cargo build --release -p asp
          mkdir -p /mnt/btrfs/proj && echo data > /mnt/btrfs/proj/file.txt
          ./target/release/asp -C /mnt/btrfs/proj init
          ./target/release/asp -C /mnt/btrfs/proj checkpoint -m base
          ./target/release/asp -C /mnt/btrfs/proj --json fork --name rf | tee /tmp/fork.json
          grep -q '"method": "reflink"' /tmp/fork.json

  benchmark-baseline:
    name: benchmark baseline (non-blocking)
    runs-on: ubuntu-latest
    continue-on-error: true
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build release binary
        run: cargo build --release -p asp
      - name: Validate benchmark fixtures
        run: |
          set -euo pipefail
          tmp="$(mktemp -d)"
          for fixture in monorepo small-files large-binaries deep-tree rename-heavy; do
            python3 scripts/spike/gen_tree.py \
              --root "$tmp/$fixture" \
              --fixture "$fixture" \
              --files 64 \
              --blob-gb 0.000001 \
              --blob-count 2
          done
      - name: Run lightweight benchmark baseline
        run: |
          python3 scripts/bench/run.py --files 2000 --blob-gb 0.02 > bench-baseline.md
          cat bench-baseline.md
      - name: Upload benchmark trend artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: asp-benchmark-baseline-${{ github.sha }}
          path: bench-baseline.md
          if-no-files-found: warn
