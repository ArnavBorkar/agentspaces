# cargo-deny policy for agentspaces.
#
# This is intentionally permissive only for common OSS-compatible licenses and
# strict about dependency sources. See:
# https://embarkstudios.github.io/cargo-deny/

[graph]
all-features = true

[advisories]
db-urls = ["https://github.com/rustsec/advisory-db"]
ignore = []

[licenses]
confidence-threshold = 0.8
unused-allowed-license = "warn"
allow = [
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-2-Clause",
  "CC0-1.0",
  "MIT",
  "Unicode-3.0",
  "Unlicense",
]

[licenses.private]
ignore = false

[bans]
multiple-versions = "warn"
wildcards = "deny"
allow-wildcard-paths = true
highlight = "simplest-path"

[bans.workspace-dependencies]
duplicates = "deny"
include-path-dependencies = false
unused = "deny"

[[bans.skip]]
name = "wit-bindgen"
version = "=0.51.0"
reason = "dev/test tooling pulls both wasip2 and wasip3 through getrandom; remove when upstream converges"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
